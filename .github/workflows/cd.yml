name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []  # Ajoutez "tests" ici si vous voulez que les tests passent avant le déploiement

    steps:
      - name: Déployer sur le VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/sailingloc-api
            git pull origin main
            docker compose -f compose.yaml up -d --build
            docker compose -f compose.yaml exec -T app php bin/console doctrine:migrations:migrate --no-interaction
            echo "Déploiement terminé"
