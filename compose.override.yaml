
services:

  app:
    build:
      target: dev
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      # En dev, les clés JWT viennent du dossier local via le volume monté ci-dessus.
      # JWT_SECRET_KEY/JWT_PUBLIC_KEY utilisent %kernel.project_dir% défini dans .env.
      JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem

  nginx:
    depends_on:
      - app
  database:
    ports:
      - "5433:5432"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
