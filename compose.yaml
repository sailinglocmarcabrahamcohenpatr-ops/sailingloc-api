
services:

  app:
    build:
      context: .
      target: prod
    restart: unless-stopped
    volumes:
      - ./var:/var/www/html/var
      - ./config/jwt:/var/www/html/config/jwt:ro
      - uploads_data:/var/www/html/public/uploads
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sailingloc}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-sailingloc}?serverVersion=16&charset=utf8
      JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: http://localhost:8082/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-!ChangeMercureHubJWTSecretKey!}
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - uploads_data:/var/www/html/public/uploads:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeMercureHubJWTSecretKey!}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins ${CORS_ALLOW_ORIGIN:-http://localhost:3000}
        anonymous 1
    ports:
      - "8082:80"


  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sailingloc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sailingloc_password}
      POSTGRES_USER: ${POSTGRES_USER:-sailingloc}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-sailingloc}", "-U", "${POSTGRES_USER:-sailingloc}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw


volumes:
  database_data:
  uploads_data:
