security:
    password_hashers:
        App\Entity\Utilisateur:
            algorithm: auto

    role_hierarchy:
        ROLE_PROPRIETAIRE: [ROLE_USER]
        ROLE_ADMIN:        [ROLE_PROPRIETAIRE]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/auth/login
            stateless: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/api/auth/login,          roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register,       roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/confirm,        roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/doc,                 roles: PUBLIC_ACCESS }
        # Routes de consultation publiques (lecture seule, sans authentification)
        - { path: ^/api/bateaux,             roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/ports,               roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/referentiels,        roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/disponibilites,      roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api,                     roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
